<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>思维导图 - 页面总结</title>
  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter','Microsoft YaHei','PingFang SC',sans-serif; background: linear-gradient(180deg, #0b1120, #111827); color: #e2e8f0; min-height: 100vh; display: flex; }
.mm-container { flex: 1; display: flex; flex-direction: column; height: 100vh; }
.mm-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px;
  background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
}
.mm-header-left { display: flex; align-items: center; gap: 12px; }
.mm-header-left h1 { font-size: 19px; font-weight: 800; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.mm-page-title { font-size: 13px; color: #64748b; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mm-header-right { display: flex; gap: 10px; }
.mm-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
  border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
  background: rgba(255,255,255,0.03); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; font-family: inherit; color: #cbd5e1;
}
.mm-btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(129,140,248,0.25); }
#btnDownload { background: linear-gradient(135deg, #10b981, #059669); color: #fff; border-color: transparent; box-shadow: 0 0 20px rgba(16,185,129,0.15); }
#btnDownload:hover { background: linear-gradient(135deg, #059669, #047857); box-shadow: 0 0 25px rgba(16,185,129,0.3); }
#btnDownload:disabled { opacity: 0.5; }
.mm-main { flex: 1; display: flex; flex-direction: column; overflow: auto; }
.mm-canvas {
  flex: 1; min-height: 400px; padding: 30px; display: flex; align-items: center; justify-content: center;
  overflow: auto; background: rgba(255,255,255,0.02); margin: 16px;
  border-radius: 14px; border: 1px solid rgba(255,255,255,0.04);
}
.mm-canvas svg { max-width: 100%; }
.mm-empty { text-align: center; color: #475569; }
.mm-empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.mm-empty p { font-size: 14px; }
.mm-summary {
  padding: 24px; background: rgba(255,255,255,0.02); margin: 0 16px 16px;
  border-radius: 14px; border: 1px solid rgba(255,255,255,0.04); display: none;
}
.mm-summary h2 { font-size: 17px; font-weight: 700; margin-bottom: 14px; color: #e2e8f0; }
.mm-summary-content { font-size: 14px; line-height: 1.85; color: #94a3b8; }
.mm-summary-content h1 { font-size: 19px; margin: 14px 0 8px; color: #e2e8f0; }
.mm-summary-content h2 { font-size: 16px; margin: 12px 0 6px; color: #cbd5e1; }
.mm-summary-content h3 { font-size: 14px; margin: 10px 0 4px; color: #94a3b8; }
.mm-canvas::-webkit-scrollbar,.mm-main::-webkit-scrollbar { width: 4px; height: 4px; }
.mm-canvas::-webkit-scrollbar-track,.mm-main::-webkit-scrollbar-track { background: transparent; }
.mm-canvas::-webkit-scrollbar-thumb,.mm-main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
.mm-canvas::-webkit-scrollbar-thumb:hover,.mm-main::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.12); }
.mm-canvas svg g:hover rect { filter: brightness(1.15) drop-shadow(0 0 12px rgba(99,102,241,0.3)); transition: all 0.2s ease; }
.mm-canvas svg g { cursor: pointer; }
  </style>
</head>
<body>
  <div class="mm-container">
    <header class="mm-header">
      <div class="mm-header-left">
        <h1>思维导图</h1>
        <span class="mm-page-title" id="pageTitle"></span>
      </div>
      <div class="mm-header-right">
        <button class="mm-btn" id="btnDownload">下载 MD</button>
        <button class="mm-btn mm-btn-back" id="btnBack">返回</button>
      </div>
    </header>
    <main class="mm-main">
      <div class="mm-canvas" id="mindmapCanvas">
        <div class="mm-empty" id="mmEmpty">
          <div class="mm-empty-icon">&#x1F5FA;&#xFE0F;</div>
          <p>正在生成思维导图...</p>
        </div>
      </div>
      <div class="mm-summary" id="mmSummary">
        <h2>总结文本</h2>
        <div class="mm-summary-content" id="mmSummaryContent"></div>
      </div>
    </main>
  </div>
  <script src="mindmap.js"></script>
</body>
</html>
