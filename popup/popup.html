<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 网页学习助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="popup-logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="url(#grad)"/>
          <path d="M8 14L12 18L20 10" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="28" y2="28">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1>AI 学习助手</h1>
    </header>

    <div class="popup-body">
      <div class="popup-status" id="status-bar">
        <span class="status-dot"></span>
        <span class="status-text">就绪</span>
      </div>

      <div class="popup-actions">
        <button class="popup-btn primary" id="btn-summary">
          <span class="btn-icon">📋</span>
          <div class="btn-info">
            <span class="btn-title">页面总结</span>
            <span class="btn-shortcut">快捷键 Alt+S</span>
          </div>
        </button>

        <button class="popup-btn" id="btn-word-summary">
          <span class="btn-icon">✏️</span>
          <div class="btn-info">
            <span class="btn-title">划词总结</span>
            <span class="btn-status" id="word-status">点击开启</span>
          </div>
        </button>
      </div>
    </div>

    <footer class="popup-footer">
      <button class="popup-link" id="btn-settings">⚙ 设置</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
