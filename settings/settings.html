<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 网页学习助手 - 设置</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="settings-container">
    <header class="settings-header">
      <h1>⚙ 设置</h1>
      <p>配置 OpenAI 兼容的 API 参数</p>
    </header>

    <div class="settings-body">
      <div class="settings-card">
        <div class="form-group">
          <label for="apiKey">API Key</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="apiKey"
              placeholder="sk-..."
              autocomplete="off"
            />
            <button type="button" class="toggle-password" id="toggleKey" title="显示/隐藏">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="baseUrl">Base URL</label>
          <input
            type="text"
            id="baseUrl"
            placeholder="https://api.openai.com"
          />
          <span class="form-hint">兼容 OpenAI 协议的 API 地址</span>
        </div>

        <div class="form-group">
          <label for="modelName">模型名称</label>
          <input
            type="text"
            id="modelName"
            placeholder="gpt-3.5-turbo"
          />
          <span class="form-hint">例如: gpt-4, deepseek-chat, qwen-plus</span>
        </div>
      </div>

      <div class="settings-card">
        <h3>快捷键说明</h3>
        <div class="shortcuts-list">
          <div class="shortcut-item">
            <kbd>Alt+S</kbd>
            <span>触发页面总结</span>
          </div>
          <div class="shortcut-item">
            <kbd>Alt+W</kbd>
            <span>开启/关闭划词总结</span>
          </div>
        </div>
      </div>

      <div class="settings-actions">
        <button type="button" class="btn-save" id="btnSave">
          <span>保存设置</span>
        </button>
        <button type="button" class="btn-test" id="btnTest">
          <span>测试连接</span>
        </button>
      </div>

      <div class="settings-status" id="statusMessage"></div>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
